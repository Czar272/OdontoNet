version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: odontonet-db
    restart: always
    environment:
      POSTGRES_USER: odontonet
      POSTGRES_PASSWORD: odontonet123
      POSTGRES_DB: odontonet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
